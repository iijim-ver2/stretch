<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ストレッチタイマー</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="paused-message">一時停止中です</div>

    <div class="container state-stopped" id="app-container">
      <h1 id="status">準備完了</h1>
      <div id="timer">30.0</div>
      <button id="btn">スタート</button>
      <button id="pip-btn" style="background: #555; margin-top: 0; font-size: 1rem; padding: 10px;">PiPで表示</button>

      <div class="exercise-list-inner">
        <ul class="exercise-list" id="exercise-list"></ul>
      </div>
    </div>

    <!-- PiP用隠し要素 -->
    <canvas
      id="pip-canvas"
      width="400"
      height="400"
      style="display:none;"
    ></canvas>
    <video
      id="pip-video"
      autoplay
      muted
      playsinline
      style="display:none;"
    ></video>

    <script src="script.js"></script>
  </body>
</html>
