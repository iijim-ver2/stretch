<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ストレッチタイマー</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container state-stopped" id="app-container">
      <h1 id="status">準備完了です</h1>
      <div id="timer">30.0</div>
      <div class="controls">
        <button id="btn">スタート</button>
        <button id="skip-btn" style="background: #f39c12; display: none;">スキップ</button>
        <button id="share-btn" style="background: #1da1f2; display: none;">Twitterに投稿</button>
      </div>
      <button id="pip-btn" class="secondary-btn">PiPで表示</button>

      <div class="exercise-list-inner">
        <ul class="exercise-list" id="exercise-list"></ul>
      </div>
    </div>

    <canvas id="pip-canvas" width="400" height="400" style="display:none;"></canvas>
    <video id="pip-video" autoplay muted playsinline style="display:none;"></video>

    <script src="script.js"></script>
  </body>
</html>
